      <path d="M0,-21 L12,0 L0,21 L-12,0 Z" fill="url(#violetRed)" stroke="#f1c76f" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="3" fill="#fff0a8"/>
    </g>
    <g id="star">
      <path d="M0,-13 L3.2,-3.2 L13,0 L3.2,3.2 L0,13 L-3.2,3.2 L-13,0 L-3.2,-3.2 Z" fill="#f1c76f" opacity="0.9"/>
    </g>
    <g id="cornerFlourish" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,0 C46,8 76,38 76,80 C76,112 52,130 30,118 C50,112 58,92 46,76 C31,56 5,58 -6,80" stroke="url(#gold)" stroke-width="2.4"/>
