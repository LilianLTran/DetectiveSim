<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1200" viewBox="0 0 700 1200" role="img" aria-labelledby="title desc">
  <title id="title">False Moon Tarot Card Back</title>
  <desc id="desc">A gothic tarot card back with a false moon eclipse motif, deep purple and crimson accents, and luminous gold linework designed to remain visible on black backgrounds.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#7a1638" stop-opacity="0.55"/>
      <stop offset="38%" stop-color="#4a1f6b" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#b13a57"/>
      <stop offset="55%" stop-color="#3b1238"/>
      <stop offset="100%" stop-color="#08030c"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0a8"/>
      <stop offset="45%" stop-color="#d8a954"/>
      <stop offset="100%" stop-color="#8c5a2b"/>
    </linearGradient>
    <linearGradient id="violetRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f2b8d"/>
      <stop offset="55%" stop-color="#8f173e"/>
      <stop offset="100%" stop-color="#d04c60"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="thinGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
