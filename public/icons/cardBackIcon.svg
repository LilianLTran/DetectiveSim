      <path d="M23,9 C38,0 52,1 63,13" stroke="url(#gold)" stroke-width="1.6"/>
      <circle cx="74" cy="82" r="4" fill="#f1c76f"/>
      <path d="M1,1 L28,28" stroke="url(#gold)" stroke-width="1.3"/>
